<div *ngIf="wizardService.business && wizardService.services[idx]" class="col-12">
  <div class="row" style="height: 100vh; max-height: 100vh; max-width: 100vw; background-color: white;">

    <div class="col-12 col-md-6">
      <app-business-wizard-left
        [serviceName]="wizardService.services[idx].name"
        label="WIZARD.SERVICE_DURATION"
      ></app-business-wizard-left>
    </div>

    <div class="col-12 col-md-5" style="background: white;">

      <div class="row" style="height: 5vh"></div>
      <div class="row d-none d-md-block" style="height: 35vh"></div>

      <form #form="ngForm" (ngSubmit)="onSubmit()">
        <div class="row">
          <div class="offset-md-2 col-md-10 offset-1 col-12">
            <div class="row">
              <div class="input-group col-5">
                <input *ngIf="!isMobile"
                       #hoursCmp="ngModel"
                       [(ngModel)]="wizardService.services[idx].duration.hours"
                       class="form-control text-right"
                       id="hoursCmp"
                       name="hoursCmp"
                       placeholder="1"
                       [class.is-invalid]="wizardService.services[idx].duration?.hours > 23 || wizardService.services[idx].duration?.hours < 0"
                       type="number">

                <input *ngIf="isMobile"
                       [(ngModel)]="wizardService.services[idx].duration.hours"
                       class="form-control text-right"
                       name="hoursCmp"
                       placeholder="1"
                       [class.is-invalid]="wizardService.services[idx].duration?.hours > 23 || wizardService.services[idx].duration?.hours < 0"
                       type="number">

                <div class="input-group-append">
                  <span class="input-group-text">{{ 'WIZARD.HOUR' | translate }}</span>
                </div>
                <div class="invalid-feedback">
                  max 23 h
                </div>
              </div>
              <div class="input-group col-5">
                <input *ngIf="!isMobile"
                       #minutesCmp="ngModel"

                       [(ngModel)]="wizardService.services[idx].duration.minutes"
                       class="form-control text-right"
                       id="minutesCmp"
                       name="minutesCmp"
                       placeholder="30"
                       min="0"
                       max="59"
                       [class.is-invalid]="wizardService.services[idx].duration?.minutes > 59 || wizardService.services[idx].duration?.minutes < 0"
                       type="number">

                <input *ngIf="isMobile"
                       [(ngModel)]="wizardService.services[idx].duration.minutes"
                       class="form-control text-right"
                       name="minutesCmp"
                       placeholder="30"
                       [class.is-invalid]="wizardService.services[idx].duration?.minutes > 59 || wizardService.services[idx].duration?.minutes < 0"
                       type="number">

                <div class="input-group-append">
                  <span class="input-group-text">{{ 'WIZARD.MINUTE' | translate }}</span>
                </div>

                <div class="invalid-feedback">
                  max 59 min
                </div>
              </div>
            </div>
          </div>
        </div>
      </form>

      <br>
      <br>
      <div class="row d-none d-md-block" style="height: 33vh"></div>

      <div class="row">
        <div class="col-sm-12 text-right" style="">
          <button (click)="showValidation = true" *ngIf="form.invalid"
                  class="btn btn-blue text-uppercase  "
                  [class.btn-continue-fix-position]="!isMobile"
                  [class.btn-continue-fix-position-mobile]="isMobile"
                  [class.btn-lg]="!isMobile"
                  type="button">
            {{ 'COMMON.CONTINUE' | translate }}
          </button>
          <button (click)="form.ngSubmit.emit()" *ngIf="!form.invalid"
                  id="wizard-continue-button"
                  [class.btn-continue-fix-position]="!isMobile"
                  [class.btn-continue-fix-position-mobile]="isMobile"
                  [class.btn-lg]="!isMobile"
                  class="btn btn-blue text-uppercase ">
            {{ 'COMMON.CONTINUE' | translate }}
          </button>
        </div>
      </div>

    </div>

  </div>
</div>
