<div class="container py-4">
  <!-- Simplified header section -->
  <div class="row mb-4">
    <div class="col-12 text-center text-white">
      <h2 class="fw-bold">{{ 'INTRO.AUDITION.TITLE' | translate }}</h2>
    </div>
  </div>
  
  <!-- Modern card grid -->
  <div class="row g-3">
    <div *ngFor="let industry of industries" class="col-6 col-md-3">
      <a [routerLink]="'/audience/' + languageService.language + '/' + industry.link" class="text-decoration-none">
        <div class="card h-100 border-0 rounded-3 shadow-sm transition-all">
          <img 
            [src]="'../../../resources/intro/audience/' + industry.img + '.png'" 
            [alt]="'META.' + industry.title + '_DESC' | translate" 
            class="card-img-top rounded-top">
          <div class="card-body p-2 text-center">
            <h6 class="card-title text-blue mb-0">{{'INTRO.INDUSTRY.' + industry.title | translate}}</h6>
          </div>
        </div>
      </a>
    </div>
  </div>
</div>
