<app-intro-item-revert
  [img]="(languageService.language == 'cs' || languageService.language == 'sk') ?  '../../../../resources/intro/notifikation-cs.png' : '../../../../resources/intro/notifikation-en.png'"
  bgType="WHITE"
  imgClass="img-responsive"
  title1="INTRO.NOTIFICATION.TITLE1"
  title2="INTRO.NOTIFICATION.TITLE"
  label1="INTRO.NOTIFICATION.LABEL1"
  label2="INTRO.NOTIFICATION.LABEL2"
  linkClass="btn btn-outline-blue d-none d-md-block"
  linkLabel="INTRO.NOTIFICATION.SHOW_DEMO"
  actionBtn="true"
  (action)="showModelWithVideo()"
>
</app-intro-item-revert>

<ng-template #videoModal let-c="close" let-d="dismiss">

  <div class="modal-header">
    <button type="button" class="close" aria-label="Close" (click)="d('Cross click')">
      <span aria-hidden="true">&times;</span>
    </button>
  </div>

  <div *ngIf="youtubeLoad" class="modal-body text-center">
    <iframe style="width: 100%; height: 60vh; border-radius: 10px;"
            [src]="'https://www.youtube.com/embed/9yYEsy6G_WU?autoplay=1' | safeUrl: 'url'"
            frameborder="0"
            allow="autoplay" allowfullscreen></iframe>
  </div>
</ng-template>
