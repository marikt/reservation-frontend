<br>
<form #form="ngForm" (ngSubmit)="onSubmit()" validate>

    <div class="form-group offset-2 col-8">
        <label>{{ 'FORM.NAME' | translate }}</label>
        <label class="pull-right">({{ 'FORM.NOT_REQUIRED' | translate }})</label>
        <input #name="ngModel" [(ngModel)]="demoService.reservation.name"
               class="form-control"
               name="name"
               placeholder="Jan Novak"
               type="text">
        <div class="feedback-icon" style=" width: 15px;">
        </div>
    </div>
    <div class="form-group offset-2 col-8">
        <label>{{ 'FORM.EMAIL' | translate }}*</label>
        <input #email="ngModel" [(ngModel)]="demoService.reservation.email"
               class="form-control"
               name="email"
               placeholder="jannovak@seznam.cz"
               required
               type="text">

        <div class="invalid-feedback">
          {{ 'FORM.NOT_REQUIRED' | translate }}
        </div>
    </div>
</form>
