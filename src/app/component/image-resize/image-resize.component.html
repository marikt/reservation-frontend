<ly-img-cropper #imgCropper
                (cropped)="onCropped($event)"
                (error)="onError($event)"
                [config]="myConfig"
                style="
                height: 50vh;
            background: white;">
    <span>Drag and drop image</span>
</ly-img-cropper>

<br>
<br>

<div class="row">
    <div class="d-none d-md-block offset-3 col-8 text-center ">

        <div class="row">

            <div class="col-2">
                <i class="far fa-image text-grey" style="position: relative; left: 20px; "></i>
            </div>

            <div class="col-6">

              <ly-slider
                [thumbVisible]="false"
                [min]="0.1"
                [max]="1"
                [(ngModel)]="imgCropper.scale"
                [step]="0.000001"></ly-slider>
<!--                <input type="range" step="0.1" max="1" min="0.1" [(ngModel)]="imgCropper.scale"-->
<!--                       class="text-grey form-control-range"-->
<!--                       id="formControlRange"-->
<!--                       style="position: relative;top: 5px;"-->
<!--                >-->
            </div>

            <div class="col-2">
                <i class="far fa-image text-grey"
                   style="font-size: 2.0em; position: relative; right: 20px; bottom: 2px; "></i>
            </div>
        </div>
    </div>
</div>
<br>
<br>
<div class="row">
    <div class="col text-center">

        <button (click)="saveCropped()" class="btn btn-red"
                style="padding-left: 45px; padding-right: 45px; ">
            OK
        </button>
    </div>
</div>
<br>
<br>
