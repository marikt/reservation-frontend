
<div class="card shadow">
  <div class="card-image-wrapper">
    <img [alt]="blogPost.title"
         [src]="'../../../../resources/blog/' + blogPost.id + '-mb.png'"
         class="card-img-top">
  </div>
  <div class="card-body">
    <div class="tag-badge">{{blogPost.tag}}</div>
    <a [routerLink]="'/blog/' + languageService.language + '/' + blogPost.link">
      <h2>{{blogPost.title}}</h2>
      <p>
        <span [innerHTML]="blogPost.desc"></span> ...
        <span class="text-blue">{{'BLOG.MORE' | translate }}</span>
      </p>

      <div class="card-footer-info">
        <div class="date">
          <i class="fa fa-calendar-alt"></i> {{blogPost.date}}
        </div>
      </div>
    </a>
  </div>
</div>
