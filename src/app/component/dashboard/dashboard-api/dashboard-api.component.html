<app-dashboard-card backLink="/dashboard-landing">

  <app-dashboard-card-label label="Api for Developers">
    <button (click)="resetApiKey()"
            class="btn btn-outline btn-outline-red btn-sm pull-right text-uppercase"
            id="add-notification-button">
      <i class="fas fa-sync-alt"></i> &nbsp; Reset API Key
    </button>
  </app-dashboard-card-label>
  <div class="container">
    <div class="row">
      <label class="custom-control">API Key</label>
      <div class="input-group col-12">
        <input #apiKeyInput [ngModel]="apiKey" class="form-control input-with-element-right"
               disabled name="buttonLabel" type="text" />
        <div class="input-group-append">
          <button (click)="copyApiKey()"
                  class="btn btn-copy btn-outline-secondary button-with-element-left"><i class="far fa-copy"></i>
          </button>
        </div>
      </div>
    </div>
    <br>
    <br>
    <div class="row">
      <div class="col-10">
        <a class="btn-link-blue"
           href="https://notado.slite.com/api/s/channel/H5qx3zrFqjN5Scr3SeGiEE/Notado%20API"
           target="_blank"> &nbsp; Api Documentation</a>
      </div>
    </div>
  </div>

</app-dashboard-card>
