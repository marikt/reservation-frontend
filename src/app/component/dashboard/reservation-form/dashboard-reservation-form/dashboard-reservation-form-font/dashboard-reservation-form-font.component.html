<div class="offset-0 col-11 edit-card" *ngIf="formService.template">
  <br>


  <div class="row" style="height: 80px !important;">
    <div class="col-12" style="">
      <div class="form-group " id="font">
        <label class="text-xsm"
               for="fontInput">{{ 'DASHBOARD.FORM_ADJUSTMENT.FONT' | translate }}
          <app-video-tutorial btnType="tooltip"
                              videoSrc="https://www.youtube.com/embed/hM5-Tf470_I"></app-video-tutorial>

        </label>
          <label class="pull-right">
          <a target="_blank"
             href="https://fonts.google.com/">
            <i class="fab fa-google" style="font-size: 1.0em; position: relative; top: 1px;"></i> fonts &nbsp;<i
            class="fas fa-arrow-right " style="font-size: 0.8em"></i>
          </a>
        </label>
        <input
          [(ngModel)]="formService.template.font"
          [ngbTypeahead]="typeaheadService.searchGoogleFonts"
          class="form-control input-sm"
          id="fontInput"/>
      </div>
    </div>
  </div>

  <br>

    <label class="text-xsm"
           for="fontInput">{{ 'DASHBOARD.FORM_ADJUSTMENT.FONT_SIZE' | translate }}
    </label>

    <div class="form-group">
    <input
      type="range"
      id="fontSizeMainLabelSlider"
      [min]="0.8"
      [max]="3"
      [step]="0.1"
      style="width: 100%;"
      [(ngModel)]="formService.template.fontSizeMainLabel">
  </div>

  <div class="form-group">
    <input
      type="range"
      id="fontSizeServiceLabelSlider"
      [min]="0.5"
      [max]="1.7"
      [step]="0.1"
      style="width: 100%;"
      [(ngModel)]="formService.template.fontSizeServiceLabel">
  </div>
  <div class="form-group">
    <input
      type="range"
      id="fontSizeServiceDescriptionSlider"
      [min]="0.5"
      [max]="1.7"
      [step]="0.1"
      style="width: 100%;"
      [(ngModel)]="formService.template.fontSizeServiceDescription">
  </div>


  <br>


</div>
