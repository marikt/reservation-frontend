<div *ngIf="connectionInProgress" class="modal-body">
  <div class="container text-center">
    <h5 style="margin-top: 25vh"><i
      class="fas fa-plug"></i> {{ 'DASHBOARD.GOOGLE_CALENDAR.CONNECTION_TO_CALENDAR' | translate }}</h5>
    <br>
    <br>
    <h2><i class="fas fa-spinner fa-spin"></i></h2>

  </div>
</div>
<div *ngIf="!connectionInProgress && type == googleConnectType.CONNECT" class="modal-body">
  <div class="container text-center">

    <img
      class="shadow rounded"
      src="../../../../../resources/dashboard/google-connect-check.png"
      style="width:300px;">
    <br>
    <br>
    <br>

    <div class="alert alert-info"><i class="fas fa-info-circle"></i>
      &nbsp;{{ 'DASHBOARD.GOOGLE_CALENDAR.INFO_FOR_CONNECT' | translate }}
    </div>
    <br>
    <br>


    <button (click)="requestGoogleCalendarToken()"
            class="btn-blue btn btn-sm text-uppercase">
      <i class="fas fa-plug"></i> &nbsp; {{ 'DASHBOARD.GOOGLE_CALENDAR.CONNECT' | translate }}
    </button>
    <br>
    <br>
  </div>
</div>

<div *ngIf="!connectionInProgress && type == googleConnectType.RESET" class="modal-body">
  <div class="container text-center">
    <h6><strong>{{ 'DASHBOARD.GOOGLE_CALENDAR.REALLY' | translate }}</strong></h6>
    <br>
    <img
      class="shadow rounded"
      src="../../../../../resources/dashboard/google-connect-check.png"
      style="width:300px;">
    <br>
    <br>
    <br>
    <div class="alert alert-info"><i class="fas fa-info-circle"></i>
      &nbsp;{{ 'DASHBOARD.GOOGLE_CALENDAR.INFO_FOR_CONNECT' | translate }}
    </div>
    <br>
    <br>
    <button (click)="resetGoogleCalendarToken()"
            class="btn-blue btn btn-sm text-uppercase">
      <i
        class="fas fa-refresh"></i> &nbsp; {{ 'DASHBOARD.GOOGLE_CALENDAR.RESET' | translate }}
    </button>
    <br>
    <br>
  </div>
</div>
