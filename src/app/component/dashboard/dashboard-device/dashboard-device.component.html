<app-dashboard-card backLink="/dashboard-landing">

  <app-dashboard-card-label label="DASHBOARD.DEVICE.TITLE">
    <button (click)="addDevice()" class="btn btn-outline-blue btn-sm pull-right text-uppercase"
            id="add-device-button">
      <i class="fas fa-plus "></i> &nbsp; {{'DASHBOARD.DEVICE.ADD_DEVICE' | translate}}
    </button>
  </app-dashboard-card-label>

  <div class="container">
    <div class="row">


      <div *ngFor="let device of devices; let idx = index;"
           class="col-md-2 col-4  text-center form-check"
           style="padding: 20px 0px; margin-right: 50px; margin-left: 0px;">

        <a [routerLink]="['/dashboard/dashboard-device-item', device.id]" [id]="'device-item-' + device.id">
          <div [class.gray-bg]="!device.active"
               [class.gray-filter]="!device.active"
               [class.white-bg]="device.active"
               class="card-item">

            <img *ngIf="device.fullPathImg"
                 [src]="server.SERVER + device.fullPathImg"
                 class="img-fluid"
                 style="border-top-right-radius: 8px;
                        border-top-left-radius: 8px;">
            <img *ngIf="!device.fullPathImg"
                 class="img-fluid"
                 src="../../../../resources/default-worker.png"
                 style="border-top-right-radius: 8px;
                        border-top-left-radius: 8px;"
                 width="350">

            <div class="row">
              <div class="col text-center">
                <br>
                <br>
                <h6>{{device.name}}</h6>
                <br *ngIf="device.active">
                <p *ngIf="!device.active" class="text-grey text-uppercase"
                   [ngbTooltip]="'TOOLTIP.DEVICE_DISABLED' | translate"
                   style="font-size: 1.1em">
                  <i class="far fa-eye-slash"></i>
                </p>
                <br *ngIf="device.active">
              </div>
            </div>
          </div>
        </a>
        <br>
      </div>
    </div>
  </div>


</app-dashboard-card>
