<app-dashboard-card backLink="/dashboard-landing">

  <app-dashboard-card-label label="DASHBOARD.SERVICE_GROUP.TITLE">
    <button (click)="addServiceGroup()" class="btn btn-outline-blue btn-sm pull-right text-uppercase"
            id="add-service-group-button"
            placement="bottom">
      <i class="fas fa-plus "></i> &nbsp; {{'DASHBOARD.SERVICE_GROUP.ADD_GROUP' | translate}}
    </button>
  </app-dashboard-card-label>
  <div class="row">
    <button *ngIf="serviceGroups && serviceGroups.length > 1" (click)="modalService.open(serviceGroupOrderModal, {size: 'sm'})"
            class="btn btn-link-blue btn-sm pull-left"
            id="sort-service-btn"
            placement="bottom">
      <i class="fas fa-sort-alpha-down"></i>&nbsp; {{ 'DASHBOARD.SERVICE.ORDER' | translate }}
    </button>
  </div>

  <div class="container">
    <div class="row">
      <div class="checkbox">
        <label class="custom-control custom-checkbox">
          <input #serviceGroupActive="ngModel"
                 (change)="dashboardService.saveTemplate()"
                 [(ngModel)]="dashboardService.getServiceGroupWindow().active"
                 class="form-check-input checkbox-lg"
                 id="dashboard-service-group-active"
                 name="serviceGroupActive"
                 type="checkbox">
          <span class="custom-control-indicator"></span>
          <span class="custom-control-description"
                style="position: relative; left: 10px; bottom: 0px;">{{'DASHBOARD.SERVICE_GROUP.ADD_TO_FORM' | translate}}</span>
          <br>
          <label
            style="position: relative; left: 10px; bottom: 8px;">({{'DASHBOARD.SERVICE_GROUP.ADD_TO_FORM_LABEL' | translate}}
            )</label>
        </label>
      </div>
    </div>

    <br>

    <div class="row">

      <div *ngFor="let serviceGroup of serviceGroups; let idx = index;"
           class="col-md-3 col-4  text-center form-check"
           style="padding: 20px 0px; margin-right: 50px; margin-left: 0px;">
        <a [routerLink]="['/dashboard/dashboard-service-group-item', serviceGroup.id]"
           [id]="serviceGroup.name + serviceGroup.id">
          <div [class.gray-bg]="!serviceGroup.active"
               [class.gray-filter]="!serviceGroup.active"
               [class.white-bg]="serviceGroup.active"
               class="card-item">

            <img *ngIf="serviceGroup.fullPathImg"
                 [src]="server.SERVER + serviceGroup.fullPathImg"
                 class="img-fluid"
                 style="border-top-right-radius: 8px;
                        border-top-left-radius: 8px;">
            <img *ngIf="!serviceGroup.fullPathImg"
                 class="img-fluid"
                 src="../../../../resources/default-service.png"
                 style="border-top-right-radius: 8px;
                        border-top-left-radius: 8px;">

            <div class="row">
              <div class="col text-center">
                <br>
                <br>
                <h6>{{serviceGroup.name}}</h6>
                <p *ngIf="serviceGroup.techName" class="text-secondary text-sm">({{serviceGroup.techName}})</p>

                <br *ngIf="serviceGroup.active">
                <p *ngIf="!serviceGroup.active" class="text-grey text-uppercase"
                   [ngbTooltip]="'TOOLTIP.SERVICE_GROUP_DISABLED' | translate"
                   style="font-size: 1.1em">
                  <i class="far fa-eye-slash"></i>
                </p>
                <br *ngIf="serviceGroup.active">
              </div>
            </div>
          </div>
        </a>
        <br>
      </div>
      <br>
      <br>

    </div>
    <br>
  <br>
    <div class="alert alert-info"><i class="fas fa-info-circle"></i> &nbsp;
      {{'DASHBOARD.SERVICE_GROUP.INFO' | translate}}
    </div>

  </div>
</app-dashboard-card>



<ng-template #serviceGroupOrderModal let-c="close" let-d="dismiss">
  <div class="modal-header text-center">
    <span class='col-12 modal-title text-center'>
      <button type="button" class="close" aria-label="Close" (click)="d('Cross click')">
        <span aria-hidden="true">&times;</span>
      </button>
    </span>
  </div>

  <div class="modal-body">
    <div class="container">
      <h5>Drag & Drop</h5>
      <br>
      <br>
      <div>
        <div class="wrapper">
          <div dragula="DRAGULA_FACTS" [(dragulaModel)]="serviceGroups">
            <div *ngFor="let serviceGroup of serviceGroups; let idx = index;" class="card grab"
                 style="padding: 10px; margin-bottom: 10px;">
              <h6><i class="text-blue fas fa-ellipsis-v"></i><i class="text-blue fas fa-ellipsis-v"></i>&nbsp;
                &nbsp; {{ serviceGroup.name }} &nbsp;
              </h6>
            </div>
          </div>
        </div>
      </div>
      <br>
      <br>
      <button (click)="saveOrder()" class="btn-blue btn btn-sm">
        <span *ngIf="preventDoubleClickService.clickInProgress" class="spinner-border spinner-border-sm text-light"
              role="status">
            <span class="sr-only">Loading...</span>
        </span>

        <i *ngIf="!preventDoubleClickService.clickInProgress" class="far fa-save "></i>
        &nbsp; {{ 'DASHBOARD.COMMON.SAVE' | translate }}
      </button>
      <br>
      <br>
    </div>
  </div>
</ng-template>
