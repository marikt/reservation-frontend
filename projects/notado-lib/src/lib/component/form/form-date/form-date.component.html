
<span *ngIf="ready">

  <app-form-template-fullscreen *ngIf="formTypeValue == formType.FULLSCREEN" cardName="DATE">
    <app-form-date-window></app-form-date-window>
  </app-form-template-fullscreen>

  <app-form-template-simple *ngIf="formTypeValue == formType.FULLSCREEN_SIMPLE" cardName="DATE">
    <app-form-date-window></app-form-date-window>
  </app-form-template-simple>

  <app-form-template-widget *ngIf="formTypeValue == formType.WIDGET" cardName="DATE">
    <app-form-date-window></app-form-date-window>
  </app-form-template-widget>

</span>
