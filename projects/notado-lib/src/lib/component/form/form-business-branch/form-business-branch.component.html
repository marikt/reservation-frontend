<span *ngIf="ready">
  <app-form-template-fullscreen *ngIf="formTypeValue == formType.FULLSCREEN" cardName="BUSINESS_BRANCH">
    <app-form-business-branch-window></app-form-business-branch-window>
  </app-form-template-fullscreen>

    <app-form-template-simple *ngIf="formTypeValue == formType.FULLSCREEN_SIMPLE" cardName="BUSINESS_BRANCH">
     <app-form-business-branch-window></app-form-business-branch-window>
  </app-form-template-simple>


  <app-form-template-widget *ngIf="formTypeValue == formType.WIDGET" cardName="BUSINESS_BRANCH">
    <app-form-business-branch-window></app-form-business-branch-window>
  </app-form-template-widget>

</span>
