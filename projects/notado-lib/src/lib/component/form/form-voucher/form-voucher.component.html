<span *ngIf="ready">

  <app-form-template-fullscreen  *ngIf="formTypeValue == formType.FULLSCREEN" cardName="VOUCHER">
    <app-form-voucher-window></app-form-voucher-window>
  </app-form-template-fullscreen>

  <app-form-template-simple *ngIf="formTypeValue == formType.FULLSCREEN_SIMPLE" cardName="VOUCHER">
      <app-form-voucher-window></app-form-voucher-window>
  </app-form-template-simple>

  <app-form-template-widget *ngIf="formTypeValue == formType.WIDGET" cardName="VOUCHER">
    <app-form-voucher-window></app-form-voucher-window>
  </app-form-template-widget>

</span>
