<span *ngIf="ready">

  <app-form-template-fullscreen *ngIf="formTypeValue == formType.FULLSCREEN" cardName="NOTE">
    <app-form-note-window></app-form-note-window>
  </app-form-template-fullscreen>

  <app-form-template-simple *ngIf="formTypeValue == formType.FULLSCREEN_SIMPLE" cardName="NOTE">
      <app-form-note-window></app-form-note-window>
  </app-form-template-simple>

  <app-form-template-widget *ngIf="formTypeValue == formType.WIDGET" cardName="NOTE">
    <app-form-note-window></app-form-note-window>
  </app-form-template-widget>

</span>
