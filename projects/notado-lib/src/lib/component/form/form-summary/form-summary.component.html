<span *ngIf="ready">

  <app-form-template-fullscreen *ngIf="formTypeValue == formType.FULLSCREEN" cardName="SUMMARY">
      <app-form-summary-window></app-form-summary-window>
  </app-form-template-fullscreen>

  <app-form-template-simple *ngIf="formTypeValue == formType.FULLSCREEN_SIMPLE" cardName="SUMMARY">
          <app-form-summary-window></app-form-summary-window>
  </app-form-template-simple>

  <app-form-template-widget *ngIf="formTypeValue == formType.WIDGET" cardName="SUMMARY">
      <app-form-summary-window></app-form-summary-window>
  </app-form-template-widget>

</span>
