<span *ngIf="ready">

  <app-form-template-fullscreen *ngIf="formTypeValue == formType.FULLSCREEN"  cardName="CUSTOM">
    <app-form-custom-window></app-form-custom-window>
  </app-form-template-fullscreen>

    <app-form-template-simple *ngIf="formTypeValue == formType.FULLSCREEN_SIMPLE" cardName="CUSTOM">
    <app-form-custom-window></app-form-custom-window>
  </app-form-template-simple>

  <app-form-template-widget *ngIf="formTypeValue == formType.WIDGET" cardName="CUSTOM">
    <app-form-custom-window></app-form-custom-window>
  </app-form-template-widget>

</span>
