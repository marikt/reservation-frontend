<span *ngIf="ready">

  <app-form-template-fullscreen *ngIf="formTypeValue == formType.FULLSCREEN" cardName="THANKS">
    <app-form-thanks-window></app-form-thanks-window>
  </app-form-template-fullscreen>

  <app-form-template-simple *ngIf="formTypeValue == formType.FULLSCREEN_SIMPLE" cardName="THANKS">
           <app-form-thanks-window></app-form-thanks-window>
  </app-form-template-simple>

  <app-form-template-widget *ngIf="formTypeValue == formType.WIDGET" cardName="THANKS">
    <app-form-thanks-window></app-form-thanks-window>
  </app-form-template-widget>

</span>
